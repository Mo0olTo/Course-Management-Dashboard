<section class="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-50">
    <div
      class="w-[380px] lg:w-[480px] min-h-[250px]
             rounded-3xl border border-slate-200
             bg-white shadow-xl shadow-slate-300
             p-8 flex flex-col items-center gap-6"
    >
      <!-- Warning Icon -->
      <div
        class="w-16 h-16 rounded-full bg-red-100
               flex items-center justify-center"
      >
        <i class="pi pi-exclamation-triangle text-xl text-red-600"></i>
      </div>
  
      <!-- Title -->
      <div class="text-center space-y-2">
        <h1 class="text-2xl font-bold text-slate-800">
          Delete <span class="text-red-600">{{itemName()}}</span>
        </h1>
  
        <p class="text-sm text-slate-500 leading-relaxed">
          This action cannot be undone. <br>
          The course will be permanently removed from the system.
        </p>
      </div>
  
      <!-- Actions -->
      <div class="w-full flex justify-center gap-4 mt-2">
        <button
          (click)="cancel.emit()"
          class="px-6 py-2 rounded-xl border border-slate-300
                 text-slate-700 font-medium
                 hover:bg-slate-100 hover:scale-105
                 transition-all duration-200 cursor-pointer"
        >
          Cancel
        </button>
  
        <button
          (click)="confirm.emit()"
          class="px-6 py-2 rounded-xl bg-red-600
                 text-white font-medium
                 hover:bg-red-700 hover:scale-105
                 transition-all duration-200 cursor-pointer"
        >
          Delete
        </button>
      </div>
    </div>
  </section>
