<section>
    <div class="w-[380px] lg:w-[480px] h-[190px] flex flex-col items-center justify-center rounded-3xl border-[1px] border-gray-400 shadow-gray-500 shadow-xs p-9 gap-5
    bg-linear-135 from-white from-50% via-white via-55% to-indigo-600">
        <div class="w-full flex items-center justify-center my-6">
            <h1 class="text-2xl font-semibold capitalize ">Confirm delete course</h1>
        </div>
        <!-- here 2 buttons for yes and no  -->
        <div class="w-full flex justify-around items-center">
            <!-- yes -->

                <div class="flex justify-center items-center bg-green-500 rounded-2xl cursor-pointer">
                    <button (click)="cancel.emit()" class="px-6 py-1  text-lg font-semibold cursor-pointer text-white">NO</button>
                </div>

            <!-- no -->
            <div class=" flex justify-center items-center bg-red-600 rounded-2xl cursor-pointer">
                <button (click)="confirm.emit()" class="px-6 py-1 text-lg font-semibold cursor-pointer text-white">YES</button>
            </div>
        </div>
    </div>
</section>
