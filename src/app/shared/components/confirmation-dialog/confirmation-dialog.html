<section class="fixed inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm z-50">
    <div
      class="w-[380px] lg:w-[480px] min-h-[250px]
             rounded-3xl border border-slate-800
             bg-slate-900 shadow-xl shadow-black/40
             p-8 flex flex-col items-center gap-6"
    >
      <!-- Warning Icon -->
      <div
        class="w-16 h-16 rounded-full bg-red-950/60 ring-1 ring-inset ring-red-500/30
               flex items-center justify-center"
      >
        <i class="pi pi-exclamation-triangle text-xl text-red-400"></i>
      </div>

      <!-- Title -->
      <div class="text-center space-y-2">
        <h1 class="text-2xl font-bold text-slate-100">
          Delete <span class="text-red-400">{{itemName()}}</span>
        </h1>

        <p class="text-sm text-slate-400 leading-relaxed">
          This action cannot be undone. <br>
          The course will be permanently removed from the system.
        </p>
      </div>

      <!-- Actions -->
      <div class="w-full flex justify-center gap-4 mt-2">
        <button
          (click)="cancel.emit()"
          class="px-6 py-2 rounded-xl border border-slate-700
                 text-slate-200 font-medium
                 hover:bg-slate-800 hover:scale-105
                 transition-all duration-200 cursor-pointer"
        >
          Cancel
        </button>

        <button
          (click)="confirm.emit()"
          class="px-6 py-2 rounded-xl bg-red-600
                 text-white font-medium
                 hover:bg-red-500 hover:scale-105
                 transition-all duration-200 cursor-pointer"
        >
          Delete
        </button>
      </div>
    </div>
  </section>
